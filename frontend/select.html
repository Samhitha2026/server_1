<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciphers — Initialize Role</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f8fafc; overflow: hidden; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.1) 0px, transparent 50%); z-index: -1; }
        .selection-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(30px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 3rem; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .selection-card:hover { transform: translateY(-10px) scale(1.02); border-color: #3b82f6; box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.8), 0 0 30px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-8">
    <div class="mesh-bg"></div>

    <div class="text-center mb-20 space-y-4">
        <h1 class="text-7xl font-black tracking-tighter premium-text">Ciphers</h1>
        <p class="text-xs font-black uppercase tracking-[0.6em] text-blue-500">Select Access Protocol</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 w-full max-w-4xl">
        <!-- Citizen Selection -->
        <div onclick="selectRole('citizen')" class="selection-card p-16 flex flex-col items-center text-center gap-8 group">
            <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 group-hover:bg-blue-600 group-hover:border-blue-500 transition-all duration-500 shadow-2xl">
                <i data-lucide="user" class="w-16 h-16 text-slate-400 group-hover:text-white transition-colors"></i>
            </div>
            <div class="space-y-3">
                <h2 class="text-3xl font-black tracking-tight group-hover:text-blue-400 transition-colors">Citizen Portal</h2>
                <p class="text-slate-500 text-sm font-medium leading-relaxed">Report anomalies, track resolutions, and verify city infrastructure integrity.</p>
            </div>
        </div>

        <!-- Authority Selection -->
        <div id="authorityCard" onclick="expandAuthority()" class="selection-card p-16 flex flex-col items-center text-center gap-8 group">
            <div class="bg-white/5 p-8 rounded-[2.5rem] border border-white/5 group-hover:bg-blue-600 group-hover:border-blue-500 transition-all duration-500 shadow-2xl">
                <i data-lucide="shield" class="w-16 h-16 text-slate-400 group-hover:text-white transition-colors"></i>
            </div>
            <div id="authorityInitial" class="space-y-3">
                <h2 class="text-3xl font-black tracking-tight group-hover:text-blue-400 transition-colors">Authority Command</h2>
                <p class="text-slate-500 text-sm font-medium leading-relaxed">Manage resolution nodes and maintain city-wide stability.</p>
            </div>
            
            <!-- Hidden Department Selector -->
            <div id="deptSelector" style="display: none;" class="w-full space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                <h2 class="text-xl font-black tracking-tight text-blue-400 uppercase">Identify Your Node</h2>
                <select id="authorityDept" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm font-bold outline-none focus:border-blue-500 transition-all">
                    <option value="Infrastructure Node">Infrastructure Node (Roads)</option>
                    <option value="Health Node">Health Node (Sanitation)</option>
                    <option value="Energy Node">Energy Node (Lighting)</option>
                    <option value="Environment Node">Environment Node (Parks)</option>
                    <option value="Resource Node">Resource Node (Water)</option>
                    <option value="Admin Node">Admin Command (Other)</option>
                </select>
                <button onclick="confirmAuthority()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest text-xs shadow-xl shadow-blue-600/20">Initialize Command</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        function selectRole(role) {
            localStorage.setItem('ciphers_selected_role', role);
            window.location.href = 'index.html';
        }

        function expandAuthority() {
            document.getElementById('authorityInitial').style.display = 'none';
            document.getElementById('deptSelector').style.display = 'block';
            document.getElementById('authorityCard').onclick = null; // Prevent re-trigger
        }

        function confirmAuthority() {
            const dept = document.getElementById('authorityDept').value;
            localStorage.setItem('ciphers_selected_role', 'authority');
            localStorage.setItem('ciphers_authority_node', dept);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
