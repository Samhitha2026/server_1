<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ciphers — Authority Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030712; color: #f8fafc; }
        .mesh-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(37, 99, 235, 0.08) 0px, transparent 50%); z-index: -1; }
        .glass-card { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; }
        .elite-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 0.75rem; color: #fff; padding: 1rem; outline: none; }
        .proof-zone { border: 2px dashed rgba(255,255,255,0.1); border-radius: 1rem; padding: 1.5rem; text-align: center; cursor: pointer; transition: all 0.3s; }
        .proof-zone:hover { border-color: #3b82f6; background: rgba(59,130,246,0.1); }
    </style>
</head>
<body onload="initializeCommand()">
    <div class="mesh-bg"></div>
    <nav class="sticky top-0 z-50 border-b border-white/5 bg-[#030712]/80 backdrop-blur-xl px-10 py-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 p-3 rounded-2xl shadow-xl shadow-blue-600/30"><i data-lucide="shield" class="w-7 h-7 text-white"></i></div>
            <div class="flex flex-col">
                <span class="text-2xl font-black tracking-tighter leading-none">Ciphers</span>
                <span id="nodeLabel" class="text-[10px] font-black text-blue-500 uppercase tracking-[0.4em] mt-1.5">Authority Node</span>
            </div>
        </div>
        <button onclick="logout()" class="p-3 bg-white/5 rounded-2xl border border-white/5 text-slate-400 hover:text-red-500 transition-colors"><i data-lucide="log-out" class="w-5 h-5"></i></button>
    </nav>

    <main class="max-w-[1400px] mx-auto px-10 py-12 grid lg:grid-cols-12 gap-12">
        <div class="lg:col-span-8 space-y-6">
            <h2 class="text-5xl font-black tracking-tighter mb-10">Resolution Queue</h2>
            <div id="queueList" class="space-y-6">
                <div class="py-20 text-center opacity-30">INITIALIZING SECURE LINK...</div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-8">
            <div class="glass-card p-10 space-y-8 sticky top-36">
                <h3 class="text-[11px] font-black text-slate-500 uppercase tracking-[0.4em]">Action Module</h3>
                <div id="actionPanel" style="display: none;" class="space-y-6">
                    <div class="p-6 bg-blue-500/5 rounded-2xl border border-blue-500/10 flex justify-between items-center">
                        <div><span class="text-[9px] font-black text-blue-500 uppercase">Target</span><h4 class="text-xl font-black" id="targetId">#---</h4></div>
                        <div class="flex flex-col items-end">
                            <span class="text-[9px] font-black text-slate-500 uppercase mb-2">Current Protocol</span>
                            <select id="newStatus" class="bg-black/50 border border-white/10 rounded-lg px-3 py-1.5 text-[10px] font-black uppercase outline-none focus:border-blue-500 transition-all">
                                <option value="Pending">Pending</option>
                                <option value="In-Progress">In-Progress</option>
                                <option value="Resolved">Resolved</option>
                            </select>
                        </div>
                    </div>
                    
                    <textarea id="updateText" class="elite-input w-full h-32 text-xs font-bold" placeholder="Define resolution steps or progress updates..."></textarea>
                    
                    <div class="proof-zone" onclick="document.getElementById('proofInput').click()">
                        <i data-lucide="camera" class="w-6 h-6 text-slate-500 mx-auto mb-2"></i>
                        <span id="proofLabel" class="text-[9px] font-black uppercase text-slate-500">Attach Evidence Proof</span>
                        <input type="file" id="proofInput" class="hidden">
                    </div>

                    <button onclick="executeResolution()" class="w-full bg-blue-600 py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-blue-600/30 hover:bg-blue-500 transition-colors">Apply Protocol Update</button>
                </div>
                <div id="noSelection" class="py-24 text-center opacity-20 font-black uppercase text-[10px]">Awaiting Thread Selection</div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();
        const _client = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
        let selectedId = null;
        let selectedProof = null;

        async function initializeCommand() {
            console.log("CIPHERS: Initiating Fast-Track Command...");
            const selectedNode = localStorage.getItem('ciphers_authority_node') || 'Admin Node';
            document.getElementById('nodeLabel').innerText = selectedNode;
            
            // Fast-Track: Load queue immediately without waiting for cloud auth
            loadQueue(selectedNode);

            try {
                // Background check only, don't block the UI
                _client.auth.getSession().then(({ data: { session } }) => {
                    if (session) console.log("CIPHERS: Cloud Identity Verified.");
                });
            } catch (err) {
                console.warn("CIPHERS: Cloud Identity offline, running in Local Mode.");
            }
        }

        async function loadQueue(node) {
            try {
                console.log("CIPHERS: Pulling Resolution Queue for " + node);
                const res = await fetch(`${CONFIG.BACKEND_URL}/api/complaints?role=authority&user_id=node_admin&node=${encodeURIComponent(node)}`);
                const data = await res.json();
                const list = document.getElementById('queueList');
                
                if (!data || data.length === 0) {
                    list.innerHTML = '<div class="py-20 text-center opacity-30 font-black uppercase tracking-widest">No Active Resolutions in Queue</div>';
                    return;
                }

                list.innerHTML = data.map(c => `
                    <div class="glass-card p-8 cursor-pointer transition-all hover:border-blue-500/30 group" onclick="selectThread('${c.id}')">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[9px] font-black uppercase text-blue-500 bg-blue-500/10 px-2 py-1 rounded">${c.status}</span>
                            <span class="text-[9px] font-black text-slate-600 uppercase tracking-widest">GPS: ${c.location}</span>
                        </div>
                        <h3 class="text-2xl font-black tracking-tight group-hover:text-blue-400 transition-colors">${c.title}</h3>
                        <p class="text-xs text-slate-500 mt-2 line-clamp-2">${c.description}</p>
                        ${c.media_paths ? `<div class="flex gap-2 pt-4">${(typeof c.media_paths === 'string' ? JSON.parse(c.media_paths) : c.media_paths).map(p => `<img src="${CONFIG.BACKEND_URL}${p}" class="w-16 h-16 object-cover rounded-lg">`).join('')}</div>` : ''}
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (err) {
                console.error("CIPHERS: Queue Error", err);
                document.getElementById('queueList').innerHTML = '<div class="py-20 text-center text-red-500/50 font-black uppercase tracking-widest">Queue Sync Failed</div>';
            }
        }

        function selectThread(id) {
            selectedId = id;
            document.getElementById('actionPanel').style.display = 'block';
            document.getElementById('noSelection').style.display = 'none';
            document.getElementById('targetId').innerText = 'ID-' + id.substring(0,8);
        }

        document.getElementById('proofInput').addEventListener('change', (e) => {
            selectedProof = e.target.files[0];
            document.getElementById('proofLabel').innerText = 'PROOF READY';
        });

        async function executeResolution() {
            let proofPath = null;
            if (selectedProof) {
                const formData = new FormData();
                formData.append('file', selectedProof);
                const res = await fetch(CONFIG.BACKEND_URL + '/api/upload', { method: 'POST', body: formData });
                const data = await res.json();
                proofPath = data.file_path;
            }

            const payload = new FormData();
            payload.append('status', document.getElementById('newStatus').value);
            payload.append('update_text', document.getElementById('updateText').value);
            payload.append('authority_name', localStorage.getItem('ciphers_authority_node') || 'Lead Command');
            if (proofPath) payload.append('proof_path', proofPath);

            await fetch(`${CONFIG.BACKEND_URL}/api/complaints/${selectedId}/status`, { method: 'POST', body: payload });
            alert('Resolution Protocol Established!');
            location.reload();
        }

        async function logout() {
            await _client.auth.signOut();
            location.href = 'select.html';
        }
    </script>
</body>
</html>
